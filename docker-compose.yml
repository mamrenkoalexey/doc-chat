services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: doc_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doc_chat
    depends_on:
      - postgres

volumes:
  pgdata:
