<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 750px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 88vh; }
        .header { padding: 16px 24px; border-bottom: 1px solid #eee; }
        .header h1 { font-size: 20px; color: #333; }
        .header p { font-size: 13px; color: #888; margin-top: 4px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .message.user { background: #0066ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.bot { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.error { background: #ffe0e0; color: #cc0000; align-self: flex-start; }
        .sources { margin-top: 8px; padding-top: 7px; border-top: 1px solid #d8dde8; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
        .sources-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .source-chip { background: #eef2ff; border: 1px solid #c5cff5; border-radius: 12px; padding: 2px 10px; font-size: 12px; color: #3a50b0; white-space: nowrap; }

        .docs-panel { padding: 10px 24px; border-top: 1px solid #eee; }
        .docs-panel .docs-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .docs-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .doc-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: #f0f4ff; border: 1px solid #c0d0ff; border-radius: 20px; font-size: 12px; color: #333; cursor: pointer; user-select: none; }
        .doc-chip input[type=checkbox] { margin: 0; cursor: pointer; accent-color: #0066ff; }
        .doc-chip.unchecked { background: #f5f5f5; border-color: #ddd; color: #aaa; }
        .docs-empty { font-size: 12px; color: #bbb; font-style: italic; }

        .upload { padding: 10px 24px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .upload input[type=file] { flex: 1; font-size: 13px; }
        .upload button { padding: 8px 16px; background: #0066ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .upload button:hover { background: #0052cc; }
        .status { font-size: 12px; color: #888; padding: 0 24px 6px; min-height: 18px; }
        .input-row { padding: 12px 24px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .input-row input:focus { border-color: #0066ff; }
        .input-row button { padding: 10px 20px; background: #0066ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .input-row button:hover { background: #0052cc; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Doc Chat</h1>
        <p>Upload documents or images and ask questions about selected files</p>
    </div>

    <div class="messages" id="messages">
        <div class="message bot">Hello! Upload documents or images — I'll answer questions about the selected ones.</div>
    </div>

    <div class="docs-panel">
        <div class="docs-label">Documents (select to include in chat):</div>
        <div class="docs-list" id="docsList">
            <span class="docs-empty">No documents uploaded yet</span>
        </div>
    </div>

    <div class="upload">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.md,.csv,.html,.htm,.rtf,.odt,.ods,.odp,.epub,.png,.jpg,.jpeg,.gif,.webp,.bmp,.tiff" multiple>
        <button onclick="uploadFiles()">Upload</button>
    </div>
    <div class="status" id="status"></div>

    <div class="input-row">
        <input type="text" id="questionInput" placeholder="Ask a question about selected documents..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const checkedFiles = new Set();

    async function loadDocuments() {
        try {
            const res = await fetch('/documents');
            const files = await res.json();
            files.forEach(f => {
                if (!checkedFiles.has(f)) checkedFiles.add(f);
            });
            renderDocs(files);
        } catch (e) {}
    }

    function renderDocs(files) {
        const list = document.getElementById('docsList');
        if (files.length === 0) {
            list.innerHTML = '<span class="docs-empty">No documents uploaded yet</span>';
            return;
        }
        list.innerHTML = files.map(f => `
            <label class="doc-chip ${checkedFiles.has(f) ? '' : 'unchecked'}" id="chip-${CSS.escape(f)}">
                <input type="checkbox" value="${f}" ${checkedFiles.has(f) ? 'checked' : ''}
                    onchange="toggleFile('${f}', this.checked)">
                ${f}
            </label>
        `).join('');
    }

    function toggleFile(filename, checked) {
        if (checked) checkedFiles.add(filename);
        else checkedFiles.delete(filename);
        const chip = document.getElementById('chip-' + CSS.escape(filename));
        if (chip) chip.className = 'doc-chip' + (checked ? '' : ' unchecked');
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addMessage(text, type, sources) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.textContent = text;

        if (sources && sources.length > 0) {
            const sourcesDiv = document.createElement('div');
            sourcesDiv.className = 'sources';
            sourcesDiv.innerHTML = '<span class="sources-label">Sources:</span>' +
                sources.map(s => `<span class="source-chip">${escapeHtml(s.filename)}</span>`).join('');
            div.appendChild(sourcesDiv);
        }

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    async function uploadFiles() {
        const files = document.getElementById('fileInput').files;
        if (files.length === 0) return alert('Select at least one PDF file');
        const status = document.getElementById('status');
        status.textContent = 'Uploading...';

        const results = [];
        for (const file of files) {
            const form = new FormData();
            form.append('file', file);
            try {
                const res = await fetch('/documents', { method: 'POST', body: form });
                const text = await res.text();
                results.push(res.ok ? text : 'Error: ' + text);
                if (res.ok) checkedFiles.add(file.name);
            } catch (e) {
                results.push('Failed: ' + file.name);
            }
        }
        status.textContent = results.join(' | ');
        document.getElementById('fileInput').value = '';
        await loadDocuments();
    }

    async function sendMessage() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;
        if (checkedFiles.size === 0) {
            addMessage('Please upload and select at least one document.', 'error');
            return;
        }
        addMessage(question, 'user');
        input.value = '';
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, filenames: [...checkedFiles] })
            });
            if (res.ok) {
                const data = await res.json();
                addMessage(data.answer, 'bot', data.sources);
            } else {
                addMessage(await res.text(), 'error');
            }
        } catch (e) {
            addMessage('Connection error', 'error');
        }
    }

    loadDocuments();
</script>
</body>
</html>
