<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doc Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            background: white;
        }
        .msg-user {
            text-align: right;
            margin-bottom: 10px;
        }
        .msg-user span {
            background: #0d6efd;
            color: white;
            padding: 8px 14px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
        }
        .msg-bot {
            text-align: left;
            margin-bottom: 10px;
        }
        .msg-bot span {
            background: #e9ecef;
            color: #333;
            padding: 8px 14px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
        }
        .msg-error span {
            background: #f8d7da;
            color: #842029;
            padding: 8px 14px;
            border-radius: 18px;
            display: inline-block;
        }
        .source-badge {
            font-size: 11px;
            background: #e7eaff;
            color: #3a50b0;
            border: 1px solid #c5cff5;
            border-radius: 12px;
            padding: 2px 8px;
            margin-right: 4px;
        }
        .doc-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e7f0ff;
            border: 1px solid #b6cfff;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            cursor: pointer;
            margin: 3px;
        }
        .doc-chip.unchecked {
            background: #f0f0f0;
            border-color: #ccc;
            color: #999;
        }
        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 15px;
            padding: 0;
            line-height: 1;
        }
        .delete-btn:hover {
            color: red;
        }
    </style>
</head>
<body>
<div class="container py-4" style="max-width: 760px;">
    <h4 class="mb-1">Doc Chat</h4>
    <p class="text-muted mb-3" style="font-size: 13px;">Upload documents or images and ask questions about them</p>

    <div class="chat-box mb-3" id="chatBox">
        <div class="msg-bot"><span>Hello! Upload a document and ask me anything about it.</span></div>
    </div>

    <div class="mb-2">
        <div class="text-muted mb-1" style="font-size: 12px;">Uploaded documents (check to include in chat):</div>
        <div id="docsList">
            <span class="text-muted" style="font-size: 12px; font-style: italic;">No documents yet</span>
        </div>
    </div>

    <div class="d-flex gap-2 mb-1">
        <input type="file" class="form-control form-control-sm" id="fileInput"
               accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.md,.csv,.html,.rtf,.odt,.epub,.png,.jpg,.jpeg,.gif,.webp,.bmp,.tiff"
               multiple>
        <button class="btn btn-sm btn-primary" onclick="uploadFiles()">Upload</button>
    </div>
    <div class="text-muted mb-3" id="uploadStatus" style="font-size: 12px; min-height: 18px;"></div>

    <div class="d-flex gap-2">
        <input type="text" class="form-control" id="questionInput"
               placeholder="Ask a question about selected documents..."
               onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const checkedFiles = new Set();

    async function loadDocuments() {
        try {
            const res = await fetch('/documents');
            const files = await res.json();
            files.forEach(f => {
                if (!checkedFiles.has(f)) checkedFiles.add(f);
            });
            renderDocs(files);
        } catch (e) {
            console.error('failed to load documents', e);
        }
    }

    function renderDocs(files) {
        const list = document.getElementById('docsList');
        if (files.length === 0) {
            list.innerHTML = '<span class="text-muted" style="font-size: 12px; font-style: italic;">No documents yet</span>';
            return;
        }
        list.innerHTML = files.map(f => `
            <div class="doc-chip ${checkedFiles.has(f) ? '' : 'unchecked'}" id="chip-${CSS.escape(f)}">
                <input type="checkbox" ${checkedFiles.has(f) ? 'checked' : ''} onchange="toggleFile('${f}', this.checked)">
                <span onclick="toggleFile('${f}', !checkedFiles.has('${f}'))" style="cursor:pointer">${f}</span>
                <button class="delete-btn" onclick="deleteDocument('${f}')">×</button>
            </div>
        `).join('');
    }

    function toggleFile(filename, checked) {
        if (checked) checkedFiles.add(filename);
        else checkedFiles.delete(filename);
        const chip = document.getElementById('chip-' + CSS.escape(filename));
        if (chip) chip.className = 'doc-chip' + (checked ? '' : ' unchecked');
    }

    async function deleteDocument(filename) {
        if (!confirm('Delete ' + filename + '?')) return;
        await fetch('/documents/' + encodeURIComponent(filename), { method: 'DELETE' });
        checkedFiles.delete(filename);
        await loadDocuments();
    }

    function addMessage(text, type, sources) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = 'msg-' + type;

        const span = document.createElement('span');
        span.textContent = text;
        div.appendChild(span);

        if (sources && sources.length > 0) {
            const sourcesDiv = document.createElement('div');
            sourcesDiv.style.marginTop = '6px';
            sourcesDiv.innerHTML = '<span style="font-size:11px;color:#999;">Sources: </span>' +
                sources.map(s => `<span class="source-badge">${s.filename}</span>`).join('');
            div.appendChild(sourcesDiv);
        }

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function uploadFiles() {
        const files = document.getElementById('fileInput').files;
        if (files.length === 0) {
            alert('Please select a file first');
            return;
        }

        const status = document.getElementById('uploadStatus');
        status.textContent = 'Uploading...';

        for (const file of files) {
            const form = new FormData();
            form.append('file', file);
            try {
                const res = await fetch('/documents', { method: 'POST', body: form });
                if (res.ok) {
                    checkedFiles.add(file.name);
                    status.textContent = 'Uploaded: ' + file.name;
                } else {
                    status.textContent = 'Error uploading ' + file.name;
                }
            } catch (e) {
                status.textContent = 'Failed: ' + file.name;
            }
        }

        document.getElementById('fileInput').value = '';
        await loadDocuments();
    }

    async function sendMessage() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;

        if (checkedFiles.size === 0) {
            addMessage('Please select at least one document first.', 'error');
            return;
        }

        addMessage(question, 'user');
        input.value = '';

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question, filenames: [...checkedFiles] })
            });

            if (res.ok) {
                const data = await res.json();
                addMessage(data.answer, 'bot', data.sources);
            } else {
                addMessage('Something went wrong, try again', 'error');
            }
        } catch (e) {
            addMessage('Connection error', 'error');
        }
    }

    loadDocuments();
</script>
</body>
</html>
